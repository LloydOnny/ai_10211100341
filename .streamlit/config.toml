[client]
showErrorDetails = false
showWarningOnDirectExecution = false

[logger]
level = "warning"

[theme]
primaryColor = "#0084b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[server]
maxUploadSize = 200
enableXsrfProtection = true
headless = true
